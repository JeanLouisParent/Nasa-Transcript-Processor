# Global defaults for the pipeline.

# I/O
input_dir = "input"
output_dir = "output"

# OCR Settings
ocr_url = "http://192.168.1.119:1234"
ocr_model = "qwen3-vl-4b"  # Vision model to use
ocr_timeout = 120
ocr_max_tokens = 4096

# Processing Settings
dpi = 300
parallel = true
workers = 4

# Image Enhancement
clahe_clip_limit = 2.0
bilateral_d = 9
unsharp_amount = 1.5
deskew_angle_threshold = 0.5

# Layout Detection
col1_end = 0.15    # Timestamp column end ratio
col2_end = 0.30    # Speaker column end ratio
header_ratio = 0.10 # Header zone ratio
