# Configuration centralisée des missions NASA

# Structure:
# [mission.<id>]
# file_name = "NomDuFichier.pdf"
# page_offset = 0 (Décalage entre page PDF et numéro page transcript)
#
# Overrides optionnels (surchargent les valeurs par défaut de PipelineConfig):
# col1_end = 0.15 (Fin colonne timestamp)
# col2_end = 0.30 (Fin colonne speaker)

[mission.7]
file_name = "AS07_TEC.PDF"
page_offset = 0

[mission.8]
file_name = "AS08_TEC.PDF"
page_offset = 0

[mission.9]
file_name = "AS09_TEC.PDF"
page_offset = 0

[mission.10]
file_name = "AS10_TEC.PDF"
page_offset = 0

[mission.11]
file_name = "AS11_TEC.PDF"
page_offset = -2
# Apollo 11 a un layout standard, on garde les défauts
col1_end = 0.15
col2_end = 0.30
# Valid speakers for correction
valid_speakers = ["CDR", "CC", "CMP", "LMP", "SC", "HOUSTON", "MS", "MSFN", "PAO", "CT", "HORNET", "MCC", "COMM", "SWIM 1", "PRESIDENT NIXON"]
# Valid locations/stations (exhaustive list based on HTML reference)
# EAGLE = Lunar Module, COLUMBIA = Command Module, TRANQ = Tranquility Base, EVA = Extra-Vehicular Activity
valid_locations = ["EAGLE", "COLUMBIA", "TRANQ", "EVA"]
# Specific OCR fixes for Apollo 11
text_replacements = { "\\bll\\b" = "11", "\\bI1\\b" = "11", "\\bil\\b" = "11", "(\\w+)'11" = "\\1'll", "GRAINED BEAM" = "GRAND BAHAMA", "Gunymas" = "Guaymas", "PFESS" = "PRESS", "PASS light" = "PRESS light", "MASTEP" = "MASTER", "CDY" = "CDR", "LIF" = "LMP", "HIM" = "LMP", "His-IVB" = "S-IVB", "His-IV" = "S-IV" }

# Mission-specific speaker OCR fixes
[mission.11.speaker_ocr_fixes]
"TLI" = "CC"
"Tli" = "CC"

# Manual speaker corrections by timestamp (for severe OCR errors)
[mission.11.manual_speaker_corrections]
"00 05 41 36" = "CMP"  # "(V'" OCR error

